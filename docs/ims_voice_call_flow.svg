<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 580" width="100%" height="100%">
  <defs>
    <style>
      .bg { fill: #0d0f18; }
      .box { fill: #161929; stroke: #262b45; stroke-width: 2; rx: 8; ry: 8; }
      .client-header { fill: #101d30; stroke: #007acc; stroke-width: 2; rx: 6; ry: 6; }
      .core-header { fill: #0a261c; stroke: #00e5ff; stroke-width: 2; rx: 6; ry: 6; }
      .gw-header { fill: #23132e; stroke: #ab47bc; stroke-width: 2; rx: 6; ry: 6; }
      .ai-header { fill: #33120c; stroke: #ff5722; stroke-width: 2; rx: 6; ry: 6; }
      
      .text-main-title { font-family: 'Inter', system-ui, sans-serif; font-size: 20px; font-weight: bold; fill: #ffffff; }
      .text-sub-title { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; fill: #90a4ae; }
      .text-node-title { font-family: 'Inter', system-ui, sans-serif; font-size: 12px; font-weight: bold; fill: #ffffff; }
      .text-node-sub { font-family: 'Inter', system-ui, sans-serif; font-size: 10px; fill: #b0bec5; }
      .text-step { font-family: 'Inter', system-ui, sans-serif; font-size: 11px; font-weight: bold; }
      
      .lifeline { stroke: #2a2f4a; stroke-width: 1.5; stroke-dasharray: 4,4; }
      .sig-line { stroke: #00e5ff; stroke-width: 2; fill: none; }
      .media-line { stroke: #76ff03; stroke-width: 2.5; fill: none; }
      .spool-line { stroke: #ab47bc; stroke-width: 2; fill: none; stroke-dasharray: 3,3; }
      .ai-line { stroke: #ff5722; stroke-width: 2.2; fill: none; }
      
      .marker-cyan { fill: #00e5ff; }
      .marker-green { fill: #76ff03; }
      .marker-purple { fill: #ab47bc; }
      .marker-orange { fill: #ff5722; }
    </style>

    <marker id="head-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker-cyan" />
    </marker>
    <marker id="head-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker-green" />
    </marker>
    <marker id="head-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker-purple" />
    </marker>
    <marker id="head-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" class="marker-orange" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1050" height="580" class="bg" />

  <!-- Header -->
  <text x="30" y="38" class="text-main-title">IMS VoLTE / VoNR Voice Call Interception Flow</text>
  <text x="30" y="58" class="text-sub-title">Real-Time SIP Signaling, In-Kernel Media Anchoring &amp; Native Java 21 Vosk Speech-to-Text</text>

  <!-- PARTICIPANT HEADERS (X positions: 70, 230, 390, 550, 710, 870, 990) -->
  
  <!-- 1. UE_1 -->
  <g transform="translate(20, 80)">
    <rect width="110" height="45" class="client-header" />
    <text x="55" y="20" text-anchor="middle" class="text-node-title">SIP User (UE_1)</text>
    <text x="55" y="35" text-anchor="middle" class="text-node-sub">Caller MSISDN</text>
  </g>
  <line x1="75" y1="125" x2="75" y2="550" class="lifeline" />

  <!-- 2. Kamailio -->
  <g transform="translate(170, 80)">
    <rect width="120" height="45" class="core-header" />
    <text x="60" y="20" text-anchor="middle" class="text-node-title">Kamailio CSCF</text>
    <text x="60" y="35" text-anchor="middle" class="text-node-sub">SIP Registrar/Proxy</text>
  </g>
  <line x1="230" y1="125" x2="230" y2="550" class="lifeline" />

  <!-- 3. rtpengine -->
  <g transform="translate(330, 80)">
    <rect width="120" height="45" class="core-header" />
    <text x="60" y="20" text-anchor="middle" class="text-node-title">rtpengine</text>
    <text x="60" y="35" text-anchor="middle" class="text-node-sub">Media Proxy/Spooler</text>
  </g>
  <line x1="390" y1="125" x2="390" y2="550" class="lifeline" />

  <!-- 4. UE_2 -->
  <g transform="translate(490, 80)">
    <rect width="110" height="45" class="client-header" />
    <text x="55" y="20" text-anchor="middle" class="text-node-title">SIP User (UE_2)</text>
    <text x="55" y="35" text-anchor="middle" class="text-node-sub">Recipient MSISDN</text>
  </g>
  <line x1="545" y1="125" x2="545" y2="550" class="lifeline" />

  <!-- 5. Native Vosk ASR -->
  <g transform="translate(640, 80)">
    <rect width="140" height="45" class="gw-header" />
    <text x="70" y="20" text-anchor="middle" class="text-node-title">Native Vosk ASR</text>
    <text x="70" y="35" text-anchor="middle" class="text-node-sub">Java 21 JNI (JVM)</text>
  </g>
  <line x1="710" y1="125" x2="710" y2="550" class="lifeline" />

  <!-- 6. Spring Boot Gateway -->
  <g transform="translate(810, 80)">
    <rect width="120" height="45" class="gw-header" />
    <text x="60" y="20" text-anchor="middle" class="text-node-title">telecom-api</text>
    <text x="60" y="35" text-anchor="middle" class="text-node-sub">Spring Policy GW</text>
  </g>
  <line x1="870" y1="125" x2="870" y2="550" class="lifeline" />

  <!-- 7. AI Spam Model Server -->
  <g transform="translate(950, 80)">
    <rect width="80" height="45" class="ai-header" />
    <text x="40" y="20" text-anchor="middle" class="text-node-title">AI Model</text>
    <text x="40" y="35" text-anchor="middle" class="text-node-sub">Port 8000</text>
  </g>
  <line x1="990" y1="125" x2="990" y2="550" class="lifeline" />

  <!-- ==================== SIGNALING STEPS ==================== -->

  <!-- Step 1: SIP INVITE -->
  <path d="M 75,150 L 230,150" class="sig-line" marker-end="url(#head-cyan)" />
  <text x="85" y="142" class="text-step" fill="#00e5ff">1. SIP INVITE (SDP, From: 15551234567)</text>

  <!-- Step 2: Call Intercept Request to Gateway -->
  <path d="M 230,185 L 870,185" class="sig-line" marker-end="url(#head-cyan)" />
  <text x="240" y="177" class="text-step" fill="#00e5ff">2. POST /api/v1/intercept/call (Prepaid &amp; EIR Check)</text>

  <!-- Step 3: Gateway Allow Response -->
  <path d="M 870,215 L 230,215" class="sig-line" marker-end="url(#head-cyan)" stroke-dasharray="4,4" />
  <text x="730" y="207" class="text-step" fill="#00e5ff">3. HTTP 200 OK (allow: true)</text>

  <!-- Step 4: rtpengine offer -->
  <path d="M 230,250 L 390,250" class="sig-line" marker-end="url(#head-cyan)" />
  <text x="240" y="242" class="text-step" fill="#00e5ff">4. NG offer (bind media ports)</text>

  <!-- Step 5: SIP INVITE to UE_2 -->
  <path d="M 230,285 L 545,285" class="sig-line" marker-end="url(#head-cyan)" />
  <text x="240" y="277" class="text-step" fill="#00e5ff">5. SIP INVITE (SDP proxied)</text>

  <!-- Step 6: 200 OK from UE_2 -->
  <path d="M 545,320 L 230,320" class="sig-line" marker-end="url(#head-cyan)" stroke-dasharray="4,4" />
  <text x="410" y="312" class="text-step" fill="#00e5ff">6. SIP 200 OK</text>

  <!-- Step 7: 200 OK to UE_1 -->
  <path d="M 230,350 L 75,350" class="sig-line" marker-end="url(#head-cyan)" stroke-dasharray="4,4" />
  <text x="85" y="342" class="text-step" fill="#00e5ff">7. SIP 200 OK (Call Established)</text>

  <!-- Step 8: In-Kernel RTP Media Proxy Stream -->
  <path d="M 75,395 L 390,395 M 390,395 L 545,395" class="media-line" marker-end="url(#head-green)" />
  <text x="85" y="387" class="text-step" fill="#76ff03">8. RTP Media Stream (In-Kernel Proxy via rtpengine)</text>

  <!-- Step 9: Audio PCAP Fork Spooling -->
  <path d="M 390,430 L 710,430" class="spool-line" marker-end="url(#head-purple)" />
  <text x="400" y="422" class="text-step" fill="#ab47bc">9. PCAP Audio Spool (/var/spool/rtpengine)</text>

  <!-- Step 10: In-JVM Native Vosk JNI ASR -->
  <rect x="660" y="455" width="220" height="30" class="box" stroke="#ab47bc" />
  <text x="770" y="474" text-anchor="middle" class="text-step" fill="#ab47bc">10. Native JNI ASR &amp; Biometrics</text>

  <!-- Step 11: Outbound AI Classification -->
  <path d="M 870,510 L 990,510" class="ai-line" marker-end="url(#head-orange)" />
  <text x="730" y="502" class="text-step" fill="#ff5722">11. POST /api/v1/classify (Text &amp; Biometrics)</text>

  <!-- Step 12: AI Classification Response -->
  <path d="M 990,540 L 870,540" class="ai-line" marker-end="url(#head-orange)" stroke-dasharray="4,4" />
  <text x="880" y="532" class="text-step" fill="#ff5722">12. HTTP 200 OK (allow/block)</text>

</svg>
