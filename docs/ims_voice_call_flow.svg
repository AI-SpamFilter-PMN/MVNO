<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
      .bg { fill: #080b14; }
      .panel-client { fill: #0d1b2e; stroke: #1e6fa8; stroke-width: 1.5; }
      .panel-core   { fill: #051a14; stroke: #00c49a; stroke-width: 1.5; }
      .panel-gw     { fill: #1a0d2e; stroke: #9b59b6; stroke-width: 1.5; }
      .panel-ai     { fill: #1f0a08; stroke: #e74c3c; stroke-width: 1.5; }
      .panel-vosk   { fill: #151a00; stroke: #c0ca33; stroke-width: 1.5; }

      .badge-num { font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: 700; fill: #080b14; }
      .title-main { font-family: Inter, system-ui, sans-serif; font-size: 21px; font-weight: 700; fill: #ffffff; letter-spacing: 0.3px; }
      .title-sub  { font-family: Inter, system-ui, sans-serif; font-size: 12px; fill: #78909c; }
      .node-name  { font-family: Inter, system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #eceff1; }
      .node-sub   { font-family: Inter, system-ui, sans-serif; font-size: 10px; fill: #90a4ae; }
      .lbl        { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 600; }

      .lifeline-client { stroke: #1e6fa8; stroke-width: 1; stroke-dasharray: 5,4; opacity: 0.6; }
      .lifeline-core   { stroke: #00c49a; stroke-width: 1; stroke-dasharray: 5,4; opacity: 0.6; }
      .lifeline-gw     { stroke: #9b59b6; stroke-width: 1; stroke-dasharray: 5,4; opacity: 0.6; }
      .lifeline-ai     { stroke: #e74c3c; stroke-width: 1; stroke-dasharray: 5,4; opacity: 0.6; }
      .lifeline-vosk   { stroke: #c0ca33; stroke-width: 1; stroke-dasharray: 5,4; opacity: 0.6; }

      .arrow-sip   { stroke: #29b6f6; stroke-width: 2;   fill: none; }
      .arrow-media { stroke: #66bb6a; stroke-width: 2.5; fill: none; }
      .arrow-spool { stroke: #ab47bc; stroke-width: 2;   fill: none; stroke-dasharray: 5,3; }
      .arrow-asr   { stroke: #d4e157; stroke-width: 2;   fill: none; }
      .arrow-ai    { stroke: #ef5350; stroke-width: 2;   fill: none; }
      .arrow-resp  { stroke-dasharray: 5,3; }

      .divider { stroke: #1e2740; stroke-width: 1; }
      .note-box { fill: #0e1627; stroke: #263252; stroke-width: 1; rx: 4; }
    </style>

    <!-- Arrow heads -->
    <marker id="h-sip"   viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#29b6f6"/>
    </marker>
    <marker id="h-media" viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#66bb6a"/>
    </marker>
    <marker id="h-spool" viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#ab47bc"/>
    </marker>
    <marker id="h-asr"   viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#d4e157"/>
    </marker>
    <marker id="h-ai"    viewBox="0 0 10 8" refX="8" refY="4" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#ef5350"/>
    </marker>
    <marker id="h-sip-l" viewBox="0 0 10 8" refX="2" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 0 L 0 4 L 10 8 z" fill="#29b6f6"/>
    </marker>
    <marker id="h-ai-l"  viewBox="0 0 10 8" refX="2" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 10 0 L 0 4 L 10 8 z" fill="#ef5350"/>
    </marker>

    <!-- Glow filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0d1526"/>
      <stop offset="100%" stop-color="#080b14"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="660" fill="url(#grad-bg)"/>
  <rect width="1200" height="660" class="bg" opacity="0.3"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="148" x2="1200" y2="148" class="divider"/>
  <line x1="0" y1="632" x2="1200" y2="632" class="divider"/>

  <!-- Title block -->
  <text x="30" y="36" class="title-main">IMS VoLTE / VoNR Voice Call Interception Flow</text>
  <text x="30" y="56" class="title-sub">Real-Time SIP Signaling · In-Kernel RTP Media Anchoring · Native Java 21 Vosk ASR JNI · AI Spam Classification</text>

  <!-- ═══════════ PARTICIPANT BOXES ═══════════
       X-centers: UE1=80  KAM=240  RTP=410  UE2=570  GW=730  VOSK=895  AI=1075 -->

  <!-- UE_1 -->
  <rect x="20"  y="72" width="120" height="52" rx="7" class="panel-client"/>
  <text x="80"  y="93"  text-anchor="middle" class="node-name">SIP User (UE_1)</text>
  <text x="80"  y="110" text-anchor="middle" class="node-sub">Caller · MSISDN</text>
  <line x1="80"  y1="124" x2="80"  y2="620" class="lifeline-client"/>

  <!-- Kamailio -->
  <rect x="170" y="72" width="140" height="52" rx="7" class="panel-core"/>
  <text x="240" y="93"  text-anchor="middle" class="node-name">Kamailio CSCF</text>
  <text x="240" y="110" text-anchor="middle" class="node-sub">SIP Registrar / Proxy · :5060</text>
  <line x1="240" y1="124" x2="240" y2="620" class="lifeline-core"/>

  <!-- rtpengine -->
  <rect x="330" y="72" width="160" height="52" rx="7" class="panel-core"/>
  <text x="410" y="93"  text-anchor="middle" class="node-name">rtpengine</text>
  <text x="410" y="110" text-anchor="middle" class="node-sub">In-Kernel Media Proxy · :22222</text>
  <line x1="410" y1="124" x2="410" y2="620" class="lifeline-core"/>

  <!-- UE_2 -->
  <rect x="505" y="72" width="130" height="52" rx="7" class="panel-client"/>
  <text x="570" y="93"  text-anchor="middle" class="node-name">SIP User (UE_2)</text>
  <text x="570" y="110" text-anchor="middle" class="node-sub">Recipient · MSISDN</text>
  <line x1="570" y1="124" x2="570" y2="620" class="lifeline-client"/>

  <!-- telecom-api -->
  <rect x="655" y="72" width="150" height="52" rx="7" class="panel-gw"/>
  <text x="730" y="93"  text-anchor="middle" class="node-name">telecom-api</text>
  <text x="730" y="110" text-anchor="middle" class="node-sub">Spring Boot Gateway · :8080</text>
  <line x1="730" y1="124" x2="730" y2="620" class="lifeline-gw"/>

  <!-- Native Vosk ASR -->
  <rect x="820" y="72" width="150" height="52" rx="7" class="panel-vosk"/>
  <text x="895" y="93"  text-anchor="middle" class="node-name">NativeVoskService</text>
  <text x="895" y="110" text-anchor="middle" class="node-sub">Java 21 JNI · In-JVM ASR</text>
  <line x1="895" y1="124" x2="895" y2="620" class="lifeline-vosk"/>

  <!-- AI Spam Model -->
  <rect x="1015" y="72" width="155" height="52" rx="7" class="panel-ai"/>
  <text x="1092" y="93"  text-anchor="middle" class="node-name">AI Spam Model</text>
  <text x="1092" y="110" text-anchor="middle" class="node-sub">REST API · :8000</text>
  <line x1="1092" y1="124" x2="1092" y2="620" class="lifeline-ai"/>

  <!-- ═══════════ SIGNALING STEPS ═══════════ -->

  <!-- Step 1: SIP INVITE UE1 → Kamailio -->
  <circle cx="80" cy="165" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="80" y="169" text-anchor="middle" class="badge-num">1</text>
  <line x1="89" y1="165" x2="232" y2="165" class="arrow-sip" marker-end="url(#h-sip)" filter="url(#glow-blue)"/>
  <text x="155" y="158" text-anchor="middle" class="lbl" fill="#29b6f6">SIP INVITE (SDP)</text>

  <!-- Step 2: POST /api/v1/intercept/call -->
  <circle cx="240" cy="205" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="240" y="209" text-anchor="middle" class="badge-num">2</text>
  <line x1="249" y1="205" x2="722" y2="205" class="arrow-sip" marker-end="url(#h-sip)"/>
  <text x="485" y="198" text-anchor="middle" class="lbl" fill="#29b6f6">POST /api/v1/intercept/call (Prepaid + EIR)</text>

  <!-- Step 3: HTTP 200 OK allow:true -->
  <circle cx="730" cy="240" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="730" y="244" text-anchor="middle" class="badge-num">3</text>
  <line x1="722" y1="240" x2="248" y2="240" class="arrow-sip arrow-resp" marker-end="url(#h-sip-l)" stroke-dasharray="6,4"/>
  <text x="485" y="233" text-anchor="middle" class="lbl" fill="#29b6f6">HTTP 200 OK  { allow: true }</text>

  <!-- Step 4: NG offer → rtpengine -->
  <circle cx="240" cy="278" r="9" fill="#00c49a" opacity="0.9"/>
  <text x="240" y="282" text-anchor="middle" class="badge-num" fill="#000">4</text>
  <line x1="249" y1="278" x2="402" y2="278" class="arrow-sip" stroke="#00c49a" marker-end="url(#h-sip)"/>
  <text x="325" y="270" text-anchor="middle" class="lbl" fill="#00c49a">NG offer (bind media)</text>

  <!-- Step 5: SDP answer ← rtpengine -->
  <line x1="402" y1="308" x2="248" y2="308" class="arrow-sip arrow-resp" stroke="#00c49a" stroke-dasharray="5,3" marker-end="url(#h-sip-l)"/>
  <text x="325" y="300" text-anchor="middle" class="lbl" fill="#00c49a">SDP answer</text>

  <!-- Step 6: SIP INVITE → UE_2 -->
  <circle cx="240" cy="345" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="240" y="349" text-anchor="middle" class="badge-num">5</text>
  <line x1="249" y1="345" x2="562" y2="345" class="arrow-sip" marker-end="url(#h-sip)"/>
  <text x="405" y="337" text-anchor="middle" class="lbl" fill="#29b6f6">SIP INVITE (SDP proxied)</text>

  <!-- Step 7: 200 OK ← UE_2 -->
  <circle cx="570" cy="378" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="570" y="382" text-anchor="middle" class="badge-num">6</text>
  <line x1="562" y1="378" x2="248" y2="378" class="arrow-sip arrow-resp" stroke-dasharray="5,3" marker-end="url(#h-sip-l)"/>
  <text x="405" y="370" text-anchor="middle" class="lbl" fill="#29b6f6">SIP 200 OK</text>

  <!-- Step 8: 200 OK → UE_1 (call established) -->
  <circle cx="240" cy="410" r="9" fill="#29b6f6" opacity="0.9"/>
  <text x="240" y="414" text-anchor="middle" class="badge-num">7</text>
  <line x1="232" y1="410" x2="88" y2="410" class="arrow-sip arrow-resp" stroke-dasharray="5,3" marker-end="url(#h-sip-l)"/>
  <text x="160" y="402" text-anchor="middle" class="lbl" fill="#29b6f6">SIP 200 OK (Established)</text>

  <!-- Step 9: RTP Media through rtpengine (bidirectional media plane) -->
  <circle cx="80" cy="448" r="9" fill="#66bb6a" opacity="0.9"/>
  <text x="80" y="452" text-anchor="middle" class="badge-num" fill="#000">8</text>
  <line x1="89" y1="448" x2="562" y2="448" class="arrow-media" marker-end="url(#h-media)" filter="url(#glow-green)"/>
  <!-- rtpengine intercept dot -->
  <circle cx="410" cy="448" r="6" fill="#66bb6a" opacity="0.85"/>
  <text x="325" y="440" text-anchor="middle" class="lbl" fill="#66bb6a">RTP Stream (In-Kernel Proxy via rtpengine)</text>

  <!-- Step 10: PCAP audio fork → Vosk -->
  <circle cx="410" cy="488" r="9" fill="#ab47bc" opacity="0.9"/>
  <text x="410" y="492" text-anchor="middle" class="badge-num">9</text>
  <line x1="419" y1="488" x2="887" y2="488" class="arrow-spool" marker-end="url(#h-spool)"/>
  <text x="650" y="480" text-anchor="middle" class="lbl" fill="#ab47bc">PCAP Audio Spool → /var/spool/rtpengine</text>

  <!-- Step 11: Native JNI ASR + Biometrics (self-box) -->
  <rect x="830" y="510" width="260" height="28" rx="5" class="note-box" stroke="#c0ca33"/>
  <text x="960" y="528" text-anchor="middle" class="lbl" fill="#d4e157">10. Native JNI ASR · Biometrics · DTMF Parse</text>

  <!-- Step 12: POST /classify → AI -->
  <circle cx="895" cy="558" r="9" fill="#ef5350" opacity="0.9"/>
  <text x="895" y="562" text-anchor="middle" class="badge-num">11</text>
  <line x1="904" y1="558" x2="1084" y2="558" class="arrow-ai" marker-end="url(#h-ai)"/>
  <text x="993" y="550" text-anchor="middle" class="lbl" fill="#ef5350">POST /classify (Transcript + Biometrics)</text>

  <!-- Step 13: Decision ← AI -->
  <circle cx="1092" cy="590" r="9" fill="#ef5350" opacity="0.9"/>
  <text x="1092" y="594" text-anchor="middle" class="badge-num">12</text>
  <line x1="1084" y1="590" x2="904" y2="590" class="arrow-ai arrow-resp" stroke-dasharray="5,3" marker-end="url(#h-ai-l)"/>
  <text x="993" y="582" text-anchor="middle" class="lbl" fill="#ef5350">HTTP 200 OK { allow / block }</text>

  <!-- Footer legend -->
  <line x1="30"  y1="648" x2="80"  y2="648" stroke="#29b6f6" stroke-width="2"/>
  <text x="88"  y="652" class="lbl" fill="#78909c" font-size="10">SIP Signaling</text>
  <line x1="170" y1="648" x2="220" y2="648" stroke="#66bb6a" stroke-width="2.5"/>
  <text x="228" y="652" class="lbl" fill="#78909c" font-size="10">RTP Media</text>
  <line x1="290" y1="648" x2="340" y2="648" stroke="#ab47bc" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="348" y="652" class="lbl" fill="#78909c" font-size="10">PCAP Spool</text>
  <line x1="420" y1="648" x2="470" y2="648" stroke="#d4e157" stroke-width="2"/>
  <text x="478" y="652" class="lbl" fill="#78909c" font-size="10">ASR JNI</text>
  <line x1="530" y1="648" x2="580" y2="648" stroke="#ef5350" stroke-width="2"/>
  <text x="588" y="652" class="lbl" fill="#78909c" font-size="10">AI Classify</text>
</svg>
