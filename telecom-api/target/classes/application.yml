# ==============================================================================
# MVNO Interception Gateway — Application Configuration
# ==============================================================================
# Framework: Spring Boot 3.4.3 + Java 21 LTS + Virtual Threads (JEP 444)
# Architecture: Single-binary Spring Boot gateway for SIP/SMS interception
# ==============================================================================

server:
  port: 8080
  # Tomcat Virtual Threads Enablement (JEP 444):
  # Enables Java 21 light-weight virtual threads for processing incoming HTTP requests.
  # Each request runs on a virtual thread backed by ForkJoinPool carriers, allowing high concurrency.
  tomcat:
    threads:
      max: 200

spring:
  application:
    name: intercept-gateway
  threads:
    virtual:
      enabled: true

  # ----------------------------------------------------------------------------
  # Data Source Configuration (SQLite WAL Mode)
  # ----------------------------------------------------------------------------
  # RATIONALE: SQLite WAL mode (/etc/kamailio/kamailio.db) allows concurrent reads
  # without blocking writers. Used by Spring Boot + Kamailio CSCF.
  datasource:
    url: jdbc:sqlite:/etc/kamailio/kamailio.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 5000

# ------------------------------------------------------------------------------
# External AI Spam Model Configuration
# ------------------------------------------------------------------------------
ai-filter:
  url: ${AI_FILTER_URL:http://ai-filter:8000/api/v1/classify}
  timeout-seconds: 5

# ------------------------------------------------------------------------------
# Native Vosk Speech-to-Text ASR Engine (JVM JNI)
# ------------------------------------------------------------------------------
vosk:
  spool-dir: /var/spool/rtpengine
  model-path: ${VOSK_MODEL_PATH:/opt/vosk-model-small-en-us-0.15}

# ------------------------------------------------------------------------------
# Actuator Observability & Health Probes
# ------------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true