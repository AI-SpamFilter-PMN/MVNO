# ==============================================================================
# MVNO Telecom Interception Gateway — Application Configuration
# ==============================================================================
# This configuration file defines the server port, Java 25 Virtual Thread settings,
# SQLite HikariCP database pool, AI Spam Filter REST endpoint, and Spring Actuator health probes.
# ==============================================================================

server:
  # HTTP Port exposed by the Spring Boot Interception Gateway
  port: 8080

spring:
  # Java 25 Virtual Threads (JEP 444 / JEP 491)
  # Enables high-throughput carrier-grade concurrency without blocking OS threads.
  threads:
    virtual:
      enabled: true

  # SQLite Database Binding (Shared subscriber registry with Kamailio & OsmoMSC)
  datasource:
    url: jdbc:sqlite:/etc/kamailio/kamailio.db
    driver-class-name: org.sqlite.JDBC
    hikari:
      pool-name: SQLitePool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-test-query: SELECT 1

# AI Spam Filter Team Integration Parameters (AI-SpamFilter-PMN)
ai-filter:
  # REST endpoint URL of the FastAPI AI Spam Model server
  url: http://ai-filter:8000/api/v1/classify
  # Socket timeout in seconds — set to 5s to accommodate CPU model inference latency
  timeout-seconds: 5

# Spring Boot Actuator Observability & Liveness Probes
management:
  endpoints:
    web:
      exposure:
        # Expose health check, system info, and Prometheus metrics endpoints
        include: health,info,metrics
  endpoint:
    health:
      probes:
        # Enables /actuator/health/liveness and /actuator/health/readiness probes
        enabled: true
      show-details: always