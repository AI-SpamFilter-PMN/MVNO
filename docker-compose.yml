# ==============================================================================
# MVNO Interception Core — Main Microservices Orchestration (Docker/Podman Compose)
# ==============================================================================
# Architecture & Security Design:
# - Rootless Execution: Designed for unprivileged container engine execution (Podman default).
# - Non-Privileged Ports: All internal container ports >1024.
# - SELinux Volume Mounts: All host mounts appended with ':z' flag for SELinux relabeling.
# ==============================================================================

version: "3.8"

networks:
  mvno_net:
    driver: bridge

services:
  # ─── MongoDB Subscriber DB (5G Core Open5GS metadata store) ───
  mongodb:
    image: mongo:8.0
    container_name: mvno-mongodb
    command: mongod --wiredTigerCacheSizeGB 0.25  # Cap WiredTiger cache to 256MB RAM
    ports:
      - "27017:27017"
    volumes:
      - ./state/mongodb:/data/db:z
    networks:
      - mvno_net
    restart: "no"
    healthcheck:
      test: mongosh --eval 'db.runCommand({ping:1})' --quiet
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── RTPEngine In-Kernel Media Proxy & Audio Forker ───
  rtpengine:
    image: ngcp/rtpengine:latest
    container_name: mvno-rtpengine
    ports:
      - "30000-30100:30000-30100/udp"  # RTP media audio stream relay range
    volumes:
      - ./configs/rtpengine:/etc/rtpengine:z
      - ./state/spool:/var/spool/rtpengine:z  # Shared PCAP audio spool directory
    networks:
      - mvno_net
    restart: "no"

  # ─── Kamailio SIP Registrar & Interception Proxy ───
  kamailio:
    image: kamailio/kamailio:5.7-alpine
    container_name: mvno-kamailio
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - ./configs/kamailio:/etc/kamailio:z
      - ./state/kamailio.db:/etc/kamailio/kamailio.db:z  # SQLite WAL database
    depends_on:
      rtpengine:
        condition: service_started
    networks:
      - mvno_net
    restart: "no"

  # ─── Osmocom MSC & SMSC Store-and-Forward Core ───
  osmo-smsc:
    build:
      context: ./configs/osmocom
    container_name: mvno-osmosmsc
    ports:
      - "2775:2775"  # SMPP 3.4 server socket
    volumes:
      - ./configs/osmocom:/etc/osmocom:z
      - ./state/hlr:/var/lib/osmocom:z  # SQLite HLR database
    networks:
      - mvno_net
    restart: "no"

  # ─── Spring Boot Interception Gateway & Vosk ASR JNI Runtime ───
  telecom-api:
    build:
      context: ./telecom-api
    container_name: mvno-api
    ports:
      - "8080:8080"  # Spring Boot REST API & Actuator
    volumes:
      - ./state/kamailio.db:/etc/kamailio/kamailio.db:z  # Shared SQLite WAL access
      - ./state/spool:/var/spool/rtpengine:z            # Shared audio spool for Vosk ASR JNI
    networks:
      - mvno_net
    restart: "no"

  # ─── VictoriaMetrics Time-Series Database ───
  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.101.0
    container_name: mvno-victoriametrics
    ports:
      - "8428:8428"  # PromQL query & ingestion API
    volumes:
      - ./state/vm-data:/victoria-metrics-data:z
    networks:
      - mvno_net
    restart: "no"

  # ─── VictoriaMetrics Telemetry Scraper (vmagent) ───
  vmagent:
    image: victoriametrics/vmagent:v1.101.0
    container_name: mvno-vmagent
    volumes:
      - ./configs/victoria-metrics/scrape.yml:/etc/prometheus/prometheus.yml:z
    depends_on:
      victoria-metrics:
        condition: service_started
    networks:
      - mvno_net
    restart: "no"

  # ─── Grafana Real-Time Telecom NOC Dashboard ───
  grafana:
    image: grafana/grafana-oss:11.6.0
    container_name: mvno-grafana
    ports:
      - "3000:3000"  # Grafana Web UI
    volumes:
      - ./state/grafana:/var/lib/grafana:z
    depends_on:
      victoria-metrics:
        condition: service_started
    networks:
      - mvno_net
    restart: "no"

