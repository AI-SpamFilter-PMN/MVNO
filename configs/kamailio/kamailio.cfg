# ==============================================================================
# MVNO Telecom Interception Core — Kamailio SIP Signaling Proxy Config
# ==============================================================================
# This configuration file controls SIP registration, authentication, dialog routing,
# media plane anchoring via RTPEngine, PIKE rate-limiting, and REST API interception.
# ==============================================================================

debug=3
log_stderror=no
memlog=5
cfgpkglog=5

# Limit Kamailio worker child processes to 4 to cap RAM consumption
children=4

# ─── Core Modules ─────────────────────────────────────────────────────────────
loadmodule "sl.so"          # Stateless reply module
loadmodule "tm.so"          # Stateful transaction manager module
loadmodule "rr.so"          # Record-Route & Loose-Route module (dialog routing)
loadmodule "maxfwd.so"      # Max-Forwards loop prevention module
loadmodule "textops.so"     # SIP header text manipulation module
loadmodule "siputils.so"    # SIP utility functions module
loadmodule "xlog.so"        # Logging module

# ─── Location & Registrar Module ──────────────────────────────────────────────
loadmodule "registrar.so"   # Handles SIP REGISTER save("location") and lookup("location")

# ─── Database Module (SQLite WAL mode for subscriber lookup) ───────────────────
loadmodule "db_sqlite.so"   # SQLite database driver
loadmodule "usrloc.so"      # User location storage module
modparam("usrloc", "db_url", "sqlite:///etc/kamailio/kamailio.db")
modparam("usrloc", "db_mode", 2) # Write-back mode for high-concurrency WAL mode

# ─── Digest Authentication Module ─────────────────────────────────────────────
loadmodule "auth.so"
loadmodule "auth_db.so"
modparam("auth_db", "db_url", "sqlite:///etc/kamailio/kamailio.db")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")

# ─── Media Plane Proxy (RTPEngine Connection) ──────────────────────────────────
# Target container hostname "rtpengine" on UDP control socket port 22222
loadmodule "rtpengine.so"
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

# ─── Security: PIKE Rate Limiting ──────────────────────────────────────────────
loadmodule "pike.so"
modparam("pike", "sampling_time_unit", 5)
modparam("pike", "reqs_density_per_unit", 30)

# ─── Security: HTable for IP Bans & Whitelist/Blacklist Caching ────────────────
loadmodule "htable.so"
modparam("htable", "htable", "ban=>size=8;autoexpire=300;")
modparam("htable", "htable", "whitelist=>size=8;autoexpire=3600;")
modparam("htable", "htable", "blacklist=>size=8;autoexpire=3600;")

# ==============================================================================
# MAIN REQUEST ROUTE
# ==============================================================================
request_route {

    # Layer 0: Handle in-dialog requests (ACK, BYE, re-INVITE)
    if (loose_route()) {
        if (is_method("ACK")) {
            t_relay();
            exit;
        }
        if (is_method("BYE")) {
            # Release RTPEngine media session before forwarding BYE
            rtpengine_delete();
            t_relay();
            exit;
        }
        if (is_method("INVITE")) {
            # Re-anchor media for session refresh
            rtpengine_manage("record-call=yes metadata=JSON");
            t_relay();
            exit;
        }
    }

    # Layer 1: PIKE Rate Limiting — Block IPs exceeding request threshold
    if ($sht(ban=>$si) == 1) {
        xlog("L_WARN", "BLOCKED banned IP: $si\n");
        send_reply(403, "Forbidden");
        exit;
    }
    if (!pike_check_req()) {
        xlog("L_WARN", "PIKE: Rate limit exceeded for $si\n");
        $sht(ban=>$si) = 1;
        send_reply(429, "Too Many Requests");
        exit;
    }

    # Layer 2: Local SLA Fallback HTable Verification
    if ($sht(whitelist=>$fU) == 1) {
        xlog("L_INFO", "SLA FALLBACK: Caller $fU whitelisted\n");
        route(LOCATION);
        exit;
    }
    if ($sht(blacklist=>$fU) == 1) {
        xlog("L_WARN", "SLA FALLBACK: Caller $fU blacklisted\n");
        send_reply(403, "Blacklisted");
        exit;
    }

    # Layer 3: Caller ID Spoof Check (for authenticated callers)
    if (is_method("INVITE") || is_method("REGISTER")) {
        if ($au != "" && $fU != $au) {
            xlog("L_WARN", "CALLER ID SPOOF DETECTED: $fU != authenticated $au\n");
            send_reply(407, "Proxy Authentication Required");
            exit;
        }
    }

    # Handle SIP REGISTER
    if (is_method("REGISTER")) {
        if (!auth_check("$fd", "subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    # Handle SIP INVITE Call Initiation
    if (is_method("INVITE")) {
        route(LOCATION);
    }

    t_relay();
}

# Location & Media Anchor Subroute
route[LOCATION] {
    if (is_method("INVITE")) {
        # Rewrite SDP offer to anchor media through RTPEngine container
        rtpengine_manage("record-call=yes metadata=JSON");
        record_route();
    }
    if (!lookup("location")) {
        send_reply(404, "Not Found");
        exit;
    }
    t_on_reply("RTP_ANSWER");
    t_relay();
}

# SDP Answer Rewriting Route
onreply_route[RTP_ANSWER] {
    if (status =~ "(183)|(200)") {
        # Rewrite callee's SDP answer to flow media through RTPEngine
        rtpengine_manage("record-call=yes metadata=JSON");
    }
}
