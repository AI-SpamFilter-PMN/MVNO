// ==========================================================
// MVNO Interception Core — Kamailio SIP Routing
// ==========================================================

debug=3
log_stderror=no
memlog=5
children=4



// ─── Core Modules (order matters: TM must be first) ──
loadmodule "tm.so"
loadmodule "pv.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"

// ─── Database (SQLite WAL for subscriber registry) ─────
// Must load before registrar (needs usrloc) and auth_db
loadmodule "db_sqlite.so"
loadmodule "usrloc.so"
modparam("usrloc", "db_url", "sqlite:///etc/kamailio/kamailio.db")
modparam("usrloc", "db_mode", 2)

// ─── Registrar (depends on usrloc + tm loaded first) ───
loadmodule "registrar.so"

// ─── Authentication ─────────────────────────────────────
loadmodule "auth.so"
loadmodule "auth_db.so"
modparam("auth_db", "db_url", "sqlite:///etc/kamailio/kamailio.db")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "password_column", "password")

// ─── Media Plane (rtpengine) ────────────────────────────
loadmodule "rtpengine.so"
modparam("rtpengine", "rtpengine_sock", "udp:rtpengine:22222")

// ─── HTTP / Exec (API gateway integration) ──────────────
// NOTE: http_client.so in Alpine 5.7.2 does NOT register config file
// commands (KEMI-only build). Use exec module + curl as a workaround.
// loadmodule "http_client.so"
loadmodule "exec.so"

// ─── Security: PIKE Rate Limiting ───────────────────────
loadmodule "pike.so"
modparam("pike", "sampling_time_unit", 5)
modparam("pike", "reqs_density_per_unit", 30)

// ─── Security: HTable for IP bans + SLA cache ──────────
loadmodule "htable.so"
modparam("htable", "htable", "ban=>size=8;autoexpire=300;")
modparam("htable", "htable", "whitelist=>size=8;autoexpire=3600;")
modparam("htable", "htable", "blacklist=>size=8;autoexpire=3600;")

// ─── Topology Hiding ────────────────────────────────────
loadmodule "topoh.so"
modparam("topoh", "mask_key", "MVNOSECRETKEY")
modparam("topoh", "mask_ip", "10.0.0.1")

// ─── Main Request Route ─────────────────────────────────
request_route {

    if (loose_route()) {
        if (is_method("ACK")) {
            t_relay();
            exit;
        }
        if (is_method("BYE")) {
            rtpengine_delete();
            t_relay();
            exit;
        }
        if (is_method("INVITE")) {
            route(LOCATION);
            exit;
        }
    }

    // Layer 1: HTable — persistent IP ban (set by API/admin vía exec)
    if ($sht(ban=>$si) == 1) {
        xlog("L_WARN", "BLOCKED banned IP: $si\n");
        send_reply(403, "Forbidden");
        exit;
    }

    // Layer 2: PIKE — dynamic rate limiting
    if (!pike_check_req()) {
        xlog("L_WARN", "PIKE: rate limit exceeded for $si\n");
        $sht(ban=>$si) = 1;
        send_reply(429, "Too Many Requests");
        exit;
    }

    if (is_method("INVITE") || is_method("REGISTER")) {
        if ($au != "" && $fU != $au) {
            xlog("L_WARN", "CALLER ID SPOOF: $fU != authenticated $au\n");
            send_reply(407, "Proxy Authentication Required");
            exit;
        }
    }

    // Layer 3: SLA Fallback — whitelist/blacklist check
    if ($sht(whitelist=>$fU) == 1) {
        xlog("L_INFO", "WHITELIST passthrough for $fU\n");
    }
    if ($sht(blacklist=>$fU) == 1) {
        xlog("L_WARN", "BLACKLIST blocked $fU\n");
        send_reply(403, "Forbidden");
        exit;
    }

    if (is_method("REGISTER")) {
        if (!auth_check("$fd", "subscriber", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        if (!save("location")) {
            sl_reply_error();
        }
        exit;
    }

    if (is_method("INVITE")) {
        // NOTE: API gateway POST deferred — no http_client commands available
        // in Alpine 5.7.2 (KEMI-only build). Use exec module in a future phase.
        // $var(payload) = "{"
        //     + "\"caller\":\"" + $fU + "\","
        //     + "\"callee\":\"" + $rU + "\","
        //     + "\"call_id\":\"" + $ci + "\""
        //     + "}";
        // exec("curl -s -X POST -H 'Content-Type: application/json' "
        //     "-d '{\"caller\":\"$fU\"}' http://telecom-api:8080/api/v1/intercept/call");
        route(LOCATION);
    }

    route(FORWARD);
}

route[LOCATION] {
    if (is_method("INVITE")) {
        rtpengine_manage("record-call=yes metadata=JSON");
        record_route();
    }
    if (!lookup("location")) {
        send_reply(404, "Not Found");
        exit;
    }
    t_on_reply("RTP_ANSWER");
    t_relay();
}

route[FORWARD] {
    if (is_method("INVITE")) {
        record_route();
    }
    if (!lookup("location")) {
        send_reply(404, "Not Found");
        exit;
    }
    t_relay();
}

onreply_route[RTP_ANSWER] {
    if (status =~ "(183)|(200)") {
        rtpengine_manage("record-call=yes metadata=JSON");
    }
}
