! ==============================================================================
! MVNO Cellular Core — Osmocom MSC & SMSC Configuration
! ==============================================================================
! VTY Rule: Space-delimited 'line vty' required. Compound directives must be spaced.
! VTY Rule: Sub-nodes MUST terminate with '!' on its own line.
! VTY Rule: '#' and '//' are INVALID comments — only '!' at line start is permitted.
! ==============================================================================

line vty
 no login
!

smpp
 local-tcp-ip 0.0.0.0 2775
 system-id MVNO_SMSC
 delivery-report-format plain

 esme mvno-api-route
  system-id mvno-api
  password changeme
  interface-version 34
  alert-notifications
 !
!

msc
 network country code 1
 mobile network code 01
 short name MVNO
 long name MVNO Interception Core
!

mgw
 remote-ip 127.0.0.1
 remote-port 2427
!
