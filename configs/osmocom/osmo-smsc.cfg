! ==========================================================
! MVNO Interception Core — OsmoMSC / SMSC Configuration
! NOTE: VTY parser only accepts '!' at line start for comments.
! ==========================================================

! VTY remote console configuration (space required: line vty)
line vty
 no login

! SMPP 3.4 Server configuration for API routing gateway
smpp
 local-tcp-ip 0.0.0.0 2775
 system-id MVNO_SMSC
 delivery-report-format plain

 ! ESME client route for telecom-api interception gateway
 esme mvno-api-route
  system-id mvno-api
  password changeme
  interface-version 34
  alert-notifications
 !
!

! Mobile Switching Center & Network PLMN identification
msc
 network country code 1
 mobile network code 01
 short name MVNO
 long name MVNO Interception Core

! Media Gateway interface binding
mgw
 remote-ip 127.0.0.1
 remote-port 2427
