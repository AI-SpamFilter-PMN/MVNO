# ==========================================================
# MVNO Interception Core — RTPEngine Media Relay Config
# ==========================================================

[rtpengine]
# Primary network interface bound inside container
interface=eth0

# Run in foreground mode (required for container orchestration)
foreground=true
log-stderr=true

# Control NG protocol socket for Kamailio signaling proxy connection
listen-ng=0.0.0.0:22222

# Prometheus HTTP metrics endpoint for VictoriaMetrics scraping
listen-http=0.0.0.0:9900

# UDP port range allocated for relaying RTP audio packets between subscribers
port-min=30000
port-max=30100

# PCAP recording directory for voice call tap / interception
recording-dir=/var/spool/rtpengine
recording-method=pcap
recording-format=eth

# Telecom metadata logging
dtmf-log=yes
media-timeout=1800
max-sessions=1000
log-level=3
